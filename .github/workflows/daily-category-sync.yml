name: Neto to Google Merchant Center - Daily Category Sync

on:
  schedule:
    - cron: '0 15 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-categories:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4.1.7
      
      - name: Set up Python
        uses: actions/setup-python@v5.1.1
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      # ← ADD THIS NEW STEP ↓
      - name: Debug Neto API Response
        env:
          NETO_API_KEY: ${{ secrets.NETO_API_KEY }}
          NETO_API_USERNAME: ${{ secrets.NETO_API_USERNAME }}
        run: python debug_neto_response.py
      # ← END NEW STEP ↑
      
      - name: Run Neto to GMC sync
        env:
          NETO_API_KEY: ${{ secrets.NETO_API_KEY }}
          NETO_API_USERNAME: ${{ secrets.NETO_API_USERNAME }}
          GOOGLE_MERCHANT_ID: ${{ secrets.GOOGLE_MERCHANT_ID }}
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
          DATAFEEDWATCH_URL: ${{ secrets.DATAFEEDWATCH_URL }}
        run: |
          echo "DEBUG: Checking environment variables..."
          echo "NETO_API_KEY is set: $([ -z "$NETO_API_KEY" ] && echo 'NO' || echo 'YES')"
          echo "NETO_API_USERNAME is set: $([ -z "$NETO_API_USERNAME" ] && echo 'NO' || echo 'YES')"
          echo "GOOGLE_MERCHANT_ID: $GOOGLE_MERCHANT_ID"
          echo "GOOGLE_CREDENTIALS_JSON length: ${#GOOGLE_CREDENTIALS_JSON}"
          echo "---"
          python neto_to_gmc_categories.py 2>&1
          if [ $? -ne 0 ]; then
            echo "Script failed with exit code $?"
            exit 1
          fi
      
      - name: Commit feed to repo
        if: success()
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          cp /tmp/neto_gmc_feed_*.xml neto_gmc_feed.xml 2>/dev/null || true
          if [ -f neto_gmc_feed.xml ]; then
            git add neto_gmc_feed.xml
            git commit -m "Update Neto categories feed - $(date -u +'%Y-%m-%d %H:%M:%S')" || echo "No changes to commit"
            git push || echo "Nothing to push"
          fi
      
      - name: Check for errors
        if: failure()
        run: |
          echo "❌ SYNC FAILED"
          echo "Check the 'Run Neto to GMC sync' step above for detailed error message"
