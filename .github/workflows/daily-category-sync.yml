name: Neto to Google Merchant Center - Daily Category Sync

on:
  schedule:
    - cron: '0 11 * * *'  # 10pm Sydney time
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-categories:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.1.7

      - name: Set up Python
        uses: actions/setup-python@v5.1.1
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Neto to GMC sync
        env:
          NETO_API_KEY: ${{ secrets.NETO_API_KEY }}
          NETO_API_USERNAME: ${{ secrets.NETO_API_USERNAME }}
          DATAFEEDWATCH_URL: ${{ secrets.DATAFEEDWATCH_URL }}
        run: |
          echo "Starting Neto to GMC sync..."
          python neto_to_gmc_categories.py

      - name: Commit feed to repo
        if: success()
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          cp /tmp/neto_gmc_feed_*.xml neto_gmc_feed.xml 2>/dev/null || true
          if [ -f neto_gmc_feed.xml ]; then
            git add neto_gmc_feed.xml
            git commit -m "Update Neto category feed - $(date -u +'%Y-%m-%d %H:%M:%S')" || echo "No changes to commit"
            git push || echo "Nothing to push"
          fi

      - name: Check for errors
        if: failure()
        run: |
          echo "❌ SYNC FAILED"
          echo "Check the 'Run Neto to GMC sync' step above for detailed error message"
