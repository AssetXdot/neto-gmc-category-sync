name: Neto to Google Merchant Center - Daily Category Sync

on:
  schedule:
    - cron: '0 11 * * *'  # 10pm Sydney time
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-feeds:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.1.7

      - name: Set up Python
        uses: actions/setup-python@v5.1.1
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run category sync (PriceSpy products + categories)
        env:
          NETO_API_KEY: ${{ secrets.NETO_API_KEY }}
          NETO_API_USERNAME: ${{ secrets.NETO_API_USERNAME }}
          DATAFEEDWATCH_URL: ${{ secrets.DATAFEEDWATCH_URL }}
        run: |
          echo "Starting Neto category feed sync..."
          python neto_to_gmc_categories.py

      - name: Run high-price feed (excluded products >$200)
        env:
          NETO_API_KEY: ${{ secrets.NETO_API_KEY }}
          NETO_API_USERNAME: ${{ secrets.NETO_API_USERNAME }}
          DATAFEEDWATCH_URL: ${{ secrets.DATAFEEDWATCH_URL }}
        run: |
          echo "Starting Neto high-price feed sync..."
          python neto_high_price_feed.py

      - name: Commit feeds to repo
        if: success()
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # Commit category feed
          cp /tmp/neto_gmc_feed_*.xml neto_gmc_feed.xml 2>/dev/null || true
          if [ -f neto_gmc_feed.xml ]; then
            git add neto_gmc_feed.xml
          fi
          
          # Commit high-price feed
          cp /tmp/neto_high_price_feed_*.xml neto_high_price_feed.xml 2>/dev/null || true
          if [ -f neto_high_price_feed.xml ]; then
            git add neto_high_price_feed.xml
          fi
          
          # Only commit if there are changes
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update Neto feeds - $(date -u +'%Y-%m-%d %H:%M:%S')"
            git push || echo "Nothing to push"
          fi

      - name: Check for errors
        if: failure()
        run: |
          echo "❌ SYNC FAILED"
          echo "Check the logs above for detailed error messages"
