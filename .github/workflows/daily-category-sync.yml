name: Neto to Google Merchant Center - Daily Category Sync

on:
  schedule:
    - cron: '0 11 * * *'  # 10pm Sydney time
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-feeds:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.1.7

      - name: Set up Python
        uses: actions/setup-python@v5.1.1
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run debug script (inspect Categories structure)
        env:
          NETO_API_KEY: ${{ secrets.NETO_API_KEY }}
          NETO_API_USERNAME: ${{ secrets.NETO_API_USERNAME }}
        run: |
          echo "Starting debug script to inspect Neto Categories structure..."
          python debug_categories.py

      - name: Check for errors
        if: failure()
        run: |
          echo "❌ DEBUG SCRIPT FAILED"
          echo "Check the logs above for detailed error messages"
