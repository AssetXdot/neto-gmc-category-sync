name: Neto to Google Merchant Center - Daily Category Sync

on:
  schedule:
    - cron: '0 15 * * *'
  workflow_dispatch:

jobs:
  sync-categories:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests PyJWT
      
      - name: Run Neto to GMC sync
        env:
          NETO_API_KEY: ${{ secrets.NETO_API_KEY }}
          NETO_CUSTOMER_ID: ${{ secrets.NETO_CUSTOMER_ID }}
          GOOGLE_MERCHANT_ID: ${{ secrets.GOOGLE_MERCHANT_ID }}
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
        run: |
          python neto_to_gmc_categories.py
      
      - name: Upload logs (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: sync-logs
          path: /tmp/neto_gmc_feed_*.xml
          retention-days: 7
